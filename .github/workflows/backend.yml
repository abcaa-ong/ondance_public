name: Backend CI

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

jobs:
  backend-ci:
    name: Lint & Test (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"

    steps:
      - uses: actions/checkout@v6

      - name: Instalar uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Instalar dependências
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Testes (pytest + coverage)
        run: uv run pytest -x --cov=user --cov=course --cov=api -p no:cacheprovider
